name: Database Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm migration'
        required: true
        default: 'no'

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - name: SSH and Run Migration
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          port: ${{ secrets.GCP_SSH_PORT || 22 }}
          script: |
            echo "Running Database Migration..."
            cd /home/${{ secrets.GCP_USER }}/be_rpa_app
            
            # Run migration in a temporary container
            docker compose run --rm app npx typeorm migration:run -d dist/config/mysql.datasource.js
            
            echo "Migration completed successfully!"
